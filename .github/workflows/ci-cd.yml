name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/movie-streaming

jobs:
  # ─── JOB 1: CI — Kiểm tra dự án ───────────────────────────
  ci:
    name: Check & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Kiểm tra cú pháp (lint)
        run: node --check app.js

  # ─── JOB 2: Docker Build & Push ─────────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: ci                    
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  # ─── JOB 3: CD — Deploy lên Server ──────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: docker                

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ubuntu
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker pull ${{ env.IMAGE_NAME }}:latest
            docker stop movie-streaming || true
            docker rm   movie-streaming || true
            docker run -d \
              --name movie-streaming \
              --restart always \
              -p 3000:3000 \
              ${{ env.IMAGE_NAME }}:latest
            echo "Deploy thành công!"